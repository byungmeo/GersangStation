name: Publish WinForms Announcements Manifest

on:
  workflow_dispatch:
    inputs:
      announcement_mode:
        description: "Announcement handling"
        required: true
        type: choice
        default: append
        options:
          - append
          - replace_all
      announcement_json:
        description: "Announcement object or array JSON"
        required: true
        type: string
      dry_run:
        description: "Validate only without committing manifest"
        required: true
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Validate workflow inputs
        shell: bash
        env:
          ANNOUNCEMENT_MODE: ${{ inputs.announcement_mode }}
          ANNOUNCEMENT_JSON: ${{ inputs.announcement_json }}
          DRY_RUN: ${{ inputs.dry_run }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "$DRY_RUN" != "true" && "$REF_NAME" != "master" ]]; then
            echo "Non-dry-run execution is restricted to the master branch. Current branch: $REF_NAME"
            exit 1
          fi

          export ANNOUNCEMENT_JSON
          python - <<'PY'
          import json
          import os

          payload = os.environ["ANNOUNCEMENT_JSON"]
          parsed = json.loads(payload)
          if not isinstance(parsed, (dict, list)):
              raise SystemExit("announcement_json must be a JSON object or array.")
          PY

      - name: Generate announcements manifest
        shell: bash
        env:
          ANNOUNCEMENT_MODE: ${{ inputs.announcement_mode }}
          ANNOUNCEMENT_JSON: ${{ inputs.announcement_json }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          MANIFEST_PATH = "metadata/winforms-announcements-manifest.json"
          generated_at = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def normalize_announcement(item):
              if not isinstance(item, dict):
                  raise SystemExit("announcement_json entries must be objects.")

              required_keys = ["id", "title", "summary", "url", "published_at"]
              for key in required_keys:
                  value = item.get(key)
                  if not isinstance(value, str) or not value.strip():
                      raise SystemExit(f'announcement_json entry must contain non-empty "{key}".')

              severity = item.get("severity", "info")
              if severity not in {"info", "warning", "critical"}:
                  raise SystemExit('announcement_json severity must be one of "info", "warning", "critical".')

              expires_at = item.get("expires_at")
              if expires_at is not None and not isinstance(expires_at, str):
                  raise SystemExit('announcement_json "expires_at" must be null or string.')

              show_popup = item.get("show_popup", True)
              if not isinstance(show_popup, bool):
                  raise SystemExit('announcement_json "show_popup" must be boolean.')

              return {
                  "id": item["id"].strip(),
                  "title": item["title"].strip(),
                  "summary": item["summary"].strip(),
                  "url": item["url"].strip(),
                  "published_at": item["published_at"].strip(),
                  "expires_at": expires_at,
                  "show_popup": show_popup,
                  "severity": severity
              }

          def parse_payload():
              parsed = json.loads(os.environ["ANNOUNCEMENT_JSON"])
              if isinstance(parsed, dict):
                  return [normalize_announcement(parsed)]
              if isinstance(parsed, list):
                  return [normalize_announcement(item) for item in parsed]
              raise SystemExit("announcement_json must be a JSON object or array.")

          def merge_announcements(existing_announcements, incoming_announcements):
              merged = []
              incoming_by_id = {item["id"]: item for item in incoming_announcements}
              seen = set()

              for item in existing_announcements:
                  item_id = item.get("id")
                  if item_id in incoming_by_id:
                      merged.append(incoming_by_id[item_id])
                      seen.add(item_id)
                  else:
                      merged.append(item)

              for item in incoming_announcements:
                  if item["id"] not in seen:
                      merged.append(item)

              merged.sort(key=lambda item: item.get("published_at", ""), reverse=True)
              return merged

          incoming = parse_payload()
          existing_announcements = []
          if os.path.exists(MANIFEST_PATH):
              with open(MANIFEST_PATH, "r", encoding="utf-8") as file:
                  existing = json.load(file)
              if isinstance(existing.get("announcements"), list):
                  existing_announcements = existing["announcements"]

          if os.environ["ANNOUNCEMENT_MODE"] == "replace_all":
              announcements = incoming
          else:
              announcements = merge_announcements(existing_announcements, incoming)

          manifest = {
              "schema_version": 1,
              "product": "winforms",
              "channel": "stable",
              "generated_at": generated_at,
              "announcements": announcements
          }

          os.makedirs("metadata", exist_ok=True)
          with open(MANIFEST_PATH, "w", encoding="utf-8", newline="\n") as file:
              json.dump(manifest, file, ensure_ascii=False, indent=2)
              file.write("\n")
          PY

      - name: Upload announcements manifest preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: winforms-announcements-manifest-${{ github.run_id }}
          path: metadata/winforms-announcements-manifest.json

      - name: Commit announcements manifest
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metadata/winforms-announcements-manifest.json

          if git diff --cached --quiet; then
            echo "Announcements manifest did not change."
            exit 0
          fi

          git commit -m "chore(winforms): update announcements manifest"
          git push origin "HEAD:${REF_NAME}"
