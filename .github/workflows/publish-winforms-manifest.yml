name: Publish WinForms Manifest

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Manifest update operation"
        required: true
        type: choice
        default: release_only
        options:
          - release_only
          - release_and_announcement
          - announcement_only
      version:
        description: "WinForms version (required for release operations)"
        required: false
        type: string
      title:
        description: "Update dialog title (required for release operations)"
        required: false
        type: string
      message:
        description: "Short update message shown in app (required for release operations)"
        required: false
        type: string
      is_mandatory:
        description: "Force update (used for release operations)"
        required: false
        type: boolean
        default: false
      asset_name:
        description: "Release asset filename (required for release operations)"
        required: false
        type: string
      announcement_mode:
        description: "Announcement handling"
        required: true
        type: choice
        default: keep_existing
        options:
          - keep_existing
          - append
          - replace_all
      announcement_json:
        description: "Announcement object or array JSON for append/replace_all"
        required: false
        type: string
      dry_run:
        description: "Validate only without committing manifest"
        required: true
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Validate workflow inputs
        shell: bash
        env:
          OPERATION: ${{ inputs.operation }}
          VERSION: ${{ inputs.version }}
          TITLE: ${{ inputs.title }}
          MESSAGE: ${{ inputs.message }}
          ASSET_NAME: ${{ inputs.asset_name }}
          ANNOUNCEMENT_MODE: ${{ inputs.announcement_mode }}
          ANNOUNCEMENT_JSON: ${{ inputs.announcement_json }}
          DRY_RUN: ${{ inputs.dry_run }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "$DRY_RUN" != "true" && "$REF_NAME" != "master" ]]; then
            echo "Non-dry-run execution is restricted to the master branch. Current branch: $REF_NAME"
            exit 1
          fi

          if [[ "$OPERATION" == "release_only" || "$OPERATION" == "release_and_announcement" ]]; then
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
              echo "Invalid version format: $VERSION"
              exit 1
            fi

            if [[ -z "${TITLE// }" ]]; then
              echo "Title must not be empty for release operations."
              exit 1
            fi

            if [[ -z "${MESSAGE// }" ]]; then
              echo "Message must not be empty for release operations."
              exit 1
            fi

            if [[ -z "${ASSET_NAME// }" ]]; then
              echo "Asset name must not be empty for release operations."
              exit 1
            fi
          fi

          if [[ "$OPERATION" == "announcement_only" && "$ANNOUNCEMENT_MODE" == "keep_existing" ]]; then
            echo "announcement_only requires append or replace_all."
            exit 1
          fi

          if [[ "$OPERATION" == "release_only" && "$ANNOUNCEMENT_MODE" != "keep_existing" ]]; then
            echo "release_only requires announcement_mode=keep_existing."
            exit 1
          fi

          if [[ "$ANNOUNCEMENT_MODE" != "keep_existing" ]]; then
            if [[ -z "${ANNOUNCEMENT_JSON// }" ]]; then
              echo "announcement_json is required when announcement_mode is append or replace_all."
              exit 1
            fi

            export ANNOUNCEMENT_JSON
            python - <<'PY'
            import json
            import os

            payload = os.environ["ANNOUNCEMENT_JSON"]
            parsed = json.loads(payload)
            if not isinstance(parsed, (dict, list)):
                raise SystemExit("announcement_json must be a JSON object or array.")
            PY
          fi

      - name: Resolve release metadata
        if: ${{ inputs.operation == 'release_only' || inputs.operation == 'release_and_announcement' }}
        id: release
        uses: actions/github-script@v7
        env:
          VERSION: ${{ inputs.version }}
          ASSET_NAME: ${{ inputs.asset_name }}
        with:
          script: |
            const version = process.env.VERSION;
            const assetName = process.env.ASSET_NAME;
            const manifestTag = `winforms-v${version}`;
            const compatibilityTag = version;

            let release;
            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: compatibilityTag
              });
              release = response.data;
            } catch (error) {
              core.setFailed(`Release not found for compatibility tag ${compatibilityTag}: ${error.message}`);
              return;
            }

            if (release.draft) {
              core.setFailed(`Release ${compatibilityTag} is still a draft.`);
              return;
            }

            if (release.prerelease) {
              core.setFailed(`Release ${compatibilityTag} is a prerelease. Stable WinForms manifest publishing expects a non-prerelease compatibility release.`);
              return;
            }

            const matchingAssets = release.assets.filter((asset) => asset.name === assetName);
            if (matchingAssets.length !== 1) {
              core.setFailed(`Expected exactly one asset named "${assetName}" on compatibility release ${compatibilityTag}, found ${matchingAssets.length}.`);
              return;
            }

            const asset = matchingAssets[0];
            core.setOutput("tag", manifestTag);
            core.setOutput("compatibility_tag", compatibilityTag);
            core.setOutput("release_html_url", release.html_url);
            core.setOutput("release_published_at", release.published_at);
            core.setOutput("asset_name", asset.name);
            core.setOutput("asset_size", String(asset.size));
            core.setOutput("asset_download_url", asset.browser_download_url);

      - name: Download release asset
        if: ${{ inputs.operation == 'release_only' || inputs.operation == 'release_and_announcement' }}
        shell: bash
        env:
          ASSET_NAME: ${{ steps.release.outputs.asset_name }}
          ASSET_DOWNLOAD_URL: ${{ steps.release.outputs.asset_download_url }}
        run: |
          set -euo pipefail
          mkdir -p .tmp
          curl -L --fail --output ".tmp/${ASSET_NAME}" "${ASSET_DOWNLOAD_URL}"

      - name: Calculate asset checksum
        if: ${{ inputs.operation == 'release_only' || inputs.operation == 'release_and_announcement' }}
        id: checksum
        shell: bash
        env:
          ASSET_NAME: ${{ steps.release.outputs.asset_name }}
        run: |
          set -euo pipefail
          sha256="$(sha256sum ".tmp/${ASSET_NAME}" | awk '{print $1}')"
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: Generate manifest
        shell: bash
        env:
          OPERATION: ${{ inputs.operation }}
          ANNOUNCEMENT_MODE: ${{ inputs.announcement_mode }}
          ANNOUNCEMENT_JSON: ${{ inputs.announcement_json }}
          VERSION: ${{ inputs.version }}
          TITLE: ${{ inputs.title }}
          MESSAGE: ${{ inputs.message }}
          IS_MANDATORY: ${{ inputs.is_mandatory }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_COMPATIBILITY_TAG: ${{ steps.release.outputs.compatibility_tag }}
          RELEASE_PUBLISHED_AT: ${{ steps.release.outputs.release_published_at }}
          RELEASE_HTML_URL: ${{ steps.release.outputs.release_html_url }}
          ASSET_NAME: ${{ steps.release.outputs.asset_name }}
          ASSET_SIZE: ${{ steps.release.outputs.asset_size }}
          ASSET_DOWNLOAD_URL: ${{ steps.release.outputs.asset_download_url }}
          ASSET_SHA256: ${{ steps.checksum.outputs.sha256 }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          MANIFEST_PATH = "metadata/winforms-manifest.json"
          OPERATION = os.environ["OPERATION"]
          ANNOUNCEMENT_MODE = os.environ["ANNOUNCEMENT_MODE"]

          def load_existing_manifest():
              if not os.path.exists(MANIFEST_PATH):
                  return {}

              with open(MANIFEST_PATH, "r", encoding="utf-8") as file:
                  return json.load(file)

          def normalize_announcement(item):
              if not isinstance(item, dict):
                  raise SystemExit("announcement_json entries must be objects.")

              required_keys = ["id", "title", "summary", "url", "published_at"]
              for key in required_keys:
                  value = item.get(key)
                  if not isinstance(value, str) or not value.strip():
                      raise SystemExit(f'announcement_json entry must contain non-empty "{key}".')

              severity = item.get("severity", "info")
              if severity not in {"info", "warning", "critical"}:
                  raise SystemExit('announcement_json severity must be one of "info", "warning", "critical".')

              expires_at = item.get("expires_at")
              if expires_at is not None and not isinstance(expires_at, str):
                  raise SystemExit('announcement_json "expires_at" must be null or string.')

              show_popup = item.get("show_popup", True)
              if not isinstance(show_popup, bool):
                  raise SystemExit('announcement_json "show_popup" must be boolean.')

              return {
                  "id": item["id"].strip(),
                  "title": item["title"].strip(),
                  "summary": item["summary"].strip(),
                  "url": item["url"].strip(),
                  "published_at": item["published_at"].strip(),
                  "expires_at": expires_at,
                  "show_popup": show_popup,
                  "severity": severity
              }

          def parse_announcement_payload():
              payload = os.environ.get("ANNOUNCEMENT_JSON", "").strip()
              if not payload:
                  return []

              parsed = json.loads(payload)
              if isinstance(parsed, dict):
                  return [normalize_announcement(parsed)]
              if isinstance(parsed, list):
                  return [normalize_announcement(item) for item in parsed]
              raise SystemExit("announcement_json must be a JSON object or array.")

          def merge_announcements(existing_announcements, incoming_announcements):
              merged = []
              incoming_by_id = {item["id"]: item for item in incoming_announcements}

              seen = set()
              for item in existing_announcements:
                  item_id = item.get("id")
                  if item_id in incoming_by_id:
                      merged.append(incoming_by_id[item_id])
                      seen.add(item_id)
                  else:
                      merged.append(item)

              for item in incoming_announcements:
                  if item["id"] not in seen:
                      merged.append(item)

              merged.sort(key=lambda item: item.get("published_at", ""), reverse=True)
              return merged

          generated_at = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")
          existing = load_existing_manifest()
          manifest = dict(existing)
          manifest["schema_version"] = 1
          manifest["product"] = "winforms"
          manifest["channel"] = "stable"
          manifest["generated_at"] = generated_at

          if OPERATION == "announcement_only" and "release" not in existing:
              raise SystemExit("announcement_only requires an existing manifest with release data.")

          if OPERATION in {"release_only", "release_and_announcement"}:
              manifest["release"] = {
                  "version": os.environ["VERSION"],
                  "tag": os.environ["RELEASE_TAG"],
                  "compatibility_tag": os.environ["RELEASE_COMPATIBILITY_TAG"],
                  "published_at": os.environ["RELEASE_PUBLISHED_AT"],
                  "is_mandatory": os.environ["IS_MANDATORY"].lower() == "true",
                  "title": os.environ["TITLE"],
                  "message": os.environ["MESSAGE"],
                  "notes_url": os.environ["RELEASE_HTML_URL"],
                  "download": {
                      "asset_name": os.environ["ASSET_NAME"],
                      "url": os.environ["ASSET_DOWNLOAD_URL"],
                      "sha256": os.environ["ASSET_SHA256"],
                      "size": int(os.environ["ASSET_SIZE"])
                  }
              }

          existing_announcements = existing.get("announcements")
          if not isinstance(existing_announcements, list):
              existing_announcements = []

          announcements = existing_announcements
          if ANNOUNCEMENT_MODE == "append":
              announcements = merge_announcements(existing_announcements, parse_announcement_payload())
          elif ANNOUNCEMENT_MODE == "replace_all":
              announcements = parse_announcement_payload()

          manifest["announcements"] = announcements

          os.makedirs("metadata", exist_ok=True)
          with open(MANIFEST_PATH, "w", encoding="utf-8", newline="\n") as file:
              json.dump(manifest, file, ensure_ascii=False, indent=2)
              file.write("\n")
          PY

      - name: Upload manifest preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: winforms-manifest-preview-${{ github.run_id }}
          path: metadata/winforms-manifest.json

      - name: Commit manifest
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          OPERATION: ${{ inputs.operation }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metadata/winforms-manifest.json

          if git diff --cached --quiet; then
            echo "Manifest did not change."
            exit 0
          fi

          if [[ "$OPERATION" == "announcement_only" ]]; then
            COMMIT_MESSAGE="chore(winforms): update manifest announcements"
          elif [[ "$OPERATION" == "release_and_announcement" ]]; then
            COMMIT_MESSAGE="chore(winforms): update manifest for v${VERSION} and announcements"
          else
            COMMIT_MESSAGE="chore(winforms): update manifest for v${VERSION}"
          fi

          git commit -m "$COMMIT_MESSAGE"
          git push origin "HEAD:${REF_NAME}"
