name: Publish WinForms Sponsors Manifest

on:
  workflow_dispatch:
    inputs:
      sponsors_mode:
        description: "Sponsors handling"
        required: true
        type: choice
        default: replace_all
        options:
          - append
          - replace_all
      sponsors_json:
        description: "Sponsor object or array JSON"
        required: true
        type: string
      dry_run:
        description: "Validate only without committing manifest"
        required: true
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Validate workflow inputs
        shell: bash
        env:
          SPONSORS_JSON: ${{ inputs.sponsors_json }}
          DRY_RUN: ${{ inputs.dry_run }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "$DRY_RUN" != "true" && "$REF_NAME" != "master" ]]; then
            echo "Non-dry-run execution is restricted to the master branch. Current branch: $REF_NAME"
            exit 1
          fi

          export SPONSORS_JSON
          python - <<'PY'
          import json
          import os

          payload = os.environ["SPONSORS_JSON"]
          parsed = json.loads(payload)
          if not isinstance(parsed, (dict, list)):
              raise SystemExit("sponsors_json must be a JSON object or array.")
          PY

      - name: Generate sponsors manifest
        shell: bash
        env:
          SPONSORS_MODE: ${{ inputs.sponsors_mode }}
          SPONSORS_JSON: ${{ inputs.sponsors_json }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          MANIFEST_PATH = "metadata/winforms-sponsors-manifest.json"
          generated_at = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def normalize_sponsor(item):
              if not isinstance(item, dict):
                  raise SystemExit("sponsors_json entries must be objects.")

              required_keys = ["id", "name", "date", "message"]
              for key in required_keys:
                  value = item.get(key)
                  if not isinstance(value, str) or not value.strip():
                      raise SystemExit(f'sponsors_json entry must contain non-empty "{key}".')

              url = item.get("url")
              if url is not None and not isinstance(url, str):
                  raise SystemExit('sponsors_json "url" must be null or string.')

              return {
                  "id": item["id"].strip(),
                  "name": item["name"].strip(),
                  "date": item["date"].strip(),
                  "message": item["message"].strip(),
                  "url": url
              }

          def parse_payload():
              parsed = json.loads(os.environ["SPONSORS_JSON"])
              if isinstance(parsed, dict):
                  return [normalize_sponsor(parsed)]
              if isinstance(parsed, list):
                  return [normalize_sponsor(item) for item in parsed]
              raise SystemExit("sponsors_json must be a JSON object or array.")

          def merge_sponsors(existing_items, incoming_items):
              merged = []
              incoming_by_id = {item["id"]: item for item in incoming_items}
              seen = set()

              for item in existing_items:
                  item_id = item.get("id")
                  if item_id in incoming_by_id:
                      merged.append(incoming_by_id[item_id])
                      seen.add(item_id)
                  else:
                      merged.append(item)

              for item in incoming_items:
                  if item["id"] not in seen:
                      merged.append(item)

              return merged

          incoming = parse_payload()
          existing_items = []
          if os.path.exists(MANIFEST_PATH):
              with open(MANIFEST_PATH, "r", encoding="utf-8") as file:
                  existing = json.load(file)
              sponsors = existing.get("sponsors")
              if isinstance(sponsors, dict) and isinstance(sponsors.get("items"), list):
                  existing_items = sponsors["items"]

          if os.environ["SPONSORS_MODE"] == "replace_all":
              items = incoming
          else:
              items = merge_sponsors(existing_items, incoming)

          manifest = {
              "schema_version": 1,
              "product": "winforms",
              "channel": "stable",
              "generated_at": generated_at,
              "sponsors": {
                  "last_updated_at": generated_at,
                  "items": items
              }
          }

          os.makedirs("metadata", exist_ok=True)
          with open(MANIFEST_PATH, "w", encoding="utf-8", newline="\n") as file:
              json.dump(manifest, file, ensure_ascii=False, indent=2)
              file.write("\n")
          PY

      - name: Upload sponsors manifest preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: winforms-sponsors-manifest-${{ github.run_id }}
          path: metadata/winforms-sponsors-manifest.json

      - name: Commit sponsors manifest
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metadata/winforms-sponsors-manifest.json

          if git diff --cached --quiet; then
            echo "Sponsors manifest did not change."
            exit 0
          fi

          git commit -m "chore(winforms): update sponsors manifest"
          git push origin "HEAD:${REF_NAME}"
